<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Victory</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      background-color: #E7E9EA;

      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column; /* stacks image + text */
      text-align: center;
    }

    img {
      max-width: 80%;
      max-height: 70vh;
      object-fit: contain;
      display: block;
    }

    .title {
      margin-top: 20px;
      color: black;
      font-size: 37px;
      font-family: Times New Roman, serif;
    }

    /* MOBILE */
    @media (max-width: 768px) {
      img {
        width: 100vw;
        height: auto;
        max-width: 100vw;
      }

      .title {
        font-size: 22px;
        padding: 0 10px;
      }
    }
  </style>
</head>
<body>

  <img src="logo.png" alt="Centered Image">

  <!-- EDIT THIS TEXT ANYTIME -->
  <div class="title">Your Title Here</div>

</body>
</html>
